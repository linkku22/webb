<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Status - Gobetasia</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.20/css/jquery.dataTables.min.css">
   
    <style>
        body { background: #f8f9fa; font-family: Arial, sans-serif; }
        .blink-dot { animation: blink 1.2s infinite; color: #28a745; font-size: 18px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-waiting { color: orange; font-weight: bold; }
        .status-aman { color: #28a745; font-weight: bold; background: #d4edda; }
        .status-blocked { color: #dc3545; font-weight: bold; background: #f8d7da; }
        .status-error { color: #dc3545; font-weight: bold; }
        .table thead th { background: #007bff; color: white; text-align: center; }
        .table td { text-align: center; vertical-align: middle; padding: 12px; }
        .domain-link { color: #007bff; text-decoration: none; }
        .domain-link:hover { text-decoration: underline; }
        .container { max-width: 1300px; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="text-center mb-4 text-primary">GOBETASIA DOMAIN STATUS</h2>
    
    <h5 class="text-center mb-3">SERVER STATUS</h5>
    <div class="table-responsive mb-5">
        <table class="table table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th>FIRSTMEDIA</th><th>INDOSAT</th><th>SMARTFREN</th><th>AXIS / XL</th>
                    <th>INDIHOME</th><th>BIZNET</th><th>TELKOMSEL</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                    <td><span class="blink-dot">●</span> RUNNING</td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 class="text-center mb-4">DOMAIN STATUS</h3>
    
    <div class="row mb-3">
        <div class="col-md-8">
            <input type="text" id="newDomain" class="form-control" placeholder="Masukkan domain baru (contoh: gobetasia-rtp.live)">
        </div>
        <div class="col-md-4">
            <button onclick="tambahDomain()" class="btn btn-success btn-block">+ Tambah Domain</button>
        </div>
    </div>

    <button onclick="cekSemuaDomain()" class="btn btn-primary btn-block mb-4">
        🚀 Cek Status Semua Domain Sekarang
    </button>

    <div class="table-responsive">
        <table id="domainTable" class="table table-bordered">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Domain Name</th>
                    <th>XL</th>
                    <th>Indihome</th>
                    <th>Biznet</th>
                    <th>Telkomsel</th>
                    <th>Smartfren</th>
                    <th>Indosat</th>
                    <th>FirstMedia</th>
                    <th>Kominfo</th>
                </tr>
            </thead>
            <tbody id="domainBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.10.20/js/jquery.dataTables.min.js"></script>
<script>
const TOKEN = "9863f19e46b1d9137dd8c6d2c78ebf67";
let domains = [
    "gobetasia-rtp.site",
    "gobetasia-rtp.club",
    "gobetasia-rtp.live"
];

let table;   // Simpan instance DataTable

function renderTable() {
    let html = '';
    domains.forEach((domain, i) => {
        html += `<tr>
            <td>${i+1}</td>
            <td><a href="https://${domain}" target="_blank" class="domain-link">${domain}</a></td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
            <td class="status-waiting">WAITING</td>
        </tr>`;
    });
    document.getElementById('domainBody').innerHTML = html;
}

function initDataTable() {
    if (table) table.destroy();
    table = $('#domainTable').DataTable({
        pageLength: 50,
        ordering: true,
        destroy: true
    });
}

async function cekSemuaDomain() {
    const rows = document.getElementById('domainBody').rows;
    
    for (let i = 0; i < rows.length; i++) {
        const domain = domains[i];
        const cells = rows[i].cells;

        for (let j = 2; j < cells.length; j++) {
            cells[j].innerHTML = "CHECKING...";
            cells[j].className = "status-waiting";
        }

        try {
            const proxy = "https://corsproxy.io/?";
            const apiURL = `https://indiwtf.com/api/check?domain=${encodeURIComponent(domain)}&token=${TOKEN}`;
            
            const res = await fetch(proxy + encodeURIComponent(apiURL));
            const data = await res.json();

            let statusText = "ERROR";
            let statusClass = "status-error";

            if (data.status === "allowed") {
                statusText = "AMAN";
                statusClass = "status-aman";
            } else if (data.status === "blocked") {
                statusText = "BLOCKED";
                statusClass = "status-blocked";
            } else if (data.error) {
                statusText = "ERROR: " + (data.error || "Unknown");
            }

            for (let j = 2; j < cells.length; j++) {
                cells[j].innerHTML = statusText;
                cells[j].className = statusClass;
            }

        } catch (err) {
            console.error(err);
            for (let j = 2; j < cells.length; j++) {
                cells[j].innerHTML = "ERROR";
                cells[j].className = "status-error";
            }
        }
    }
}

function tambahDomain() {
    const input = document.getElementById('newDomain');
    const val = input.value.trim().toLowerCase();

    if (!val) return alert("Masukkan domain dulu!");
    if (domains.includes(val)) return alert("Domain ini sudah ada!");

    domains.push(val);
    renderTable();
    initDataTable();           // ← Ini yang diperbaiki
    
    input.value = '';          // Kosongkan input
    alert("Domain berhasil ditambahkan! ✅");
}

$(document).ready(function() {
    renderTable();
    initDataTable();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IndoBlock Check</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-2xl mx-auto pt-12 px-4">
    <h1 class="text-4xl font-bold text-center mb-2">IndoBlock Check</h1>
    <p class="text-center text-zinc-400 mb-8">Cek apakah situs diblokir di Indonesia</p>

    <div class="glass border border-white/10 rounded-3xl p-8">
      <div class="flex gap-3">
        <input id="domainInput" type="text" placeholder="contoh: hakimaru.com atau youtube.com"
          class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        <button onclick="checkDomain()" 
          class="bg-blue-600 hover:bg-blue-500 px-8 rounded-2xl font-medium flex items-center gap-2">
          <i class="fas fa-shield-alt"></i> Cek
        </button>
      </div>
    </div>

    <div id="loading" class="hidden mt-6 text-center">
      <i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
      <p class="mt-3 text-zinc-400">Sedang mengecek dari Jakarta...</p>
    </div>

    <div id="result" class="hidden mt-8 glass border border-white/10 rounded-3xl p-8"></div>
  </div>

  <script>
    const apiToken = '9863f19e46b1d9137dd8c6d2c78ebf67';
    const baseURL = 'https://indiwtf.com/api';

    async function checkDomain() {
      const input = document.getElementById('domainInput').value.trim();
      if (!input) return alert("Masukkan domain dulu!");

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');

      let domain = input.replace(/^https?:\/\//, '').split('/')[0];

      // Menggunakan CORS Proxy untuk mengatasi error "Failed to fetch"
      const proxy = "https://corsproxy.io/?";
      const apiURL = `${baseURL}/check?domain=${encodeURIComponent(domain)}&token=${apiToken}`;

      try {
        const res = await fetch(proxy + encodeURIComponent(apiURL));
        
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        showResult(data);

      } catch (err) {
        console.error(err);
        document.getElementById('result').innerHTML = `
          <div class="text-red-400 text-center">
            <i class="fas fa-exclamation-triangle text-5xl mb-4"></i>
            <p class="font-medium">Gagal melakukan pengecekan</p>
            <p class="text-sm mt-2">${err.message}</p>
            <p class="text-xs mt-4 text-zinc-500">Coba refresh halaman atau gunakan domain lain</p>
          </div>`;
        document.getElementById('result').classList.remove('hidden');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function showResult(data) {
      const isBlocked = data.status === 'blocked';
      const resultDiv = document.getElementById('result');

      resultDiv.innerHTML = `
        <div class="flex items-center gap-5">
          <div class="text-6xl">${isBlocked ? '🚫' : '✅'}</div>
          <div class="flex-1">
            <p class="text-2xl font-bold">${data.domain}</p>
            <p class="text-lg ${isBlocked ? 'text-red-400' : 'text-green-400'}">
              ${isBlocked ? 'Diblokir di Indonesia' : 'Bisa diakses di Indonesia'}
            </p>
          </div>
          <div class="text-right">
            <span class="inline-block px-5 py-2 rounded-full font-bold ${isBlocked ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}">
              ${isBlocked ? 'BLOCKED' : 'ALLOWED'}
            </span>
          </div>
        </div>
      `;
      resultDiv.classList.remove('hidden');
    }

    // Tekan Enter untuk cek
    document.getElementById('domainInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkDomain();
    });
  </script>
</body>
</html>
